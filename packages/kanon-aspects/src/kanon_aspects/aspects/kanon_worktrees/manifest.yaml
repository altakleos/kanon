kanon-dialect: "2026-05-01"
stability: experimental
depth-range: [0, 2]
default-depth: 1
description: "Worktree isolation for parallel work"
requires: []
provides:
  - worktree-isolation
suggests:
  - "kanon-sdd >= 1"
# Per-aspect sub-manifest for `worktrees` — isolated parallel execution via git worktrees.
#
# Depth 0: opt-out. Depth 1: prose guidance. Depth 2: prose + automation.
# Strict-superset semantics: depth-N is the union of depth-0..depth-N for scaffolding.
# Paths under `files:` are relative to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_worktrees/files/.
# Paths under `protocols:` are relative to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_worktrees/protocols/.
# Names under `sections:` resolve to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_worktrees/sections/<name>.md,
# except the unprefixed `protocols-index` which is rendered dynamically by the CLI
# as the cross-aspect unified catalog.
#
# See docs/specs/worktrees.md and ADR-0014.

files: []
depth-0:
  files: []
  protocols: []
  sections: []

depth-1:
  files: []
  protocols:
    - worktree-lifecycle.md
    - branch-hygiene.md
  sections:
    - protocols-index

depth-2:
  files:
    - scripts/worktree-setup.sh
    - scripts/worktree-teardown.sh
    - scripts/worktree-status.sh
  protocols: []
  sections: []
