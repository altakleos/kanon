kanon-dialect: "2026-05-01"
stability: experimental
depth-range: [0, 1]
default-depth: 1
description: "Behavioural conformance via lexical assertions"
requires: []
provides:
  - behavioural-verification
suggests: []
# Per-aspect sub-manifest for `kanon-fidelity` — Tier-1 behavioural-conformance verification.
#
# Depth 0: opt-out. Depth 1: lexical-replay engine + authoring protocol + AGENTS.md fragments.
# Strict-superset semantics: depth-N is the union of depth-0..depth-N for scaffolding.
# Paths under `protocols:` are relative to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_fidelity/protocols/.
# Names under `sections:` resolve to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_fidelity/sections/<name>.md.
#
# The assertion engine ships in kernel/_fidelity.py (kit-internal) and runs as part
# of `kanon verify` when the aspect is enabled at depth >= 1, per the carve-out in
# verification-contract.md INV-10 (ratified by ADR-0029).
#
# See docs/specs/fidelity.md and ADR-0031.

files: []
depth-0:
  files: []
  protocols: []
  sections: []

depth-1:
  files: []
  protocols:
    - fidelity-fixture-authoring.md
    - fidelity-discipline.md
  sections: []
