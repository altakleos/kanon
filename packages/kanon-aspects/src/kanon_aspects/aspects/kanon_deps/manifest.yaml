kanon-dialect: "2026-05-01"
stability: experimental
depth-range: [0, 2]
default-depth: 1
description: "Dependency hygiene and CI scanner"
requires: []
provides:
  - dependency-hygiene
suggests: []
# Deps aspect — dependency hygiene for LLM-agent-driven repos.
#
# Depth 0: opt-out. Depth 1: prose guidance. Depth 2: prose + CI validator.
# Strict-superset semantics: depth-N is the union of depth-0..depth-N.
# Paths under `files:` are relative to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_deps/files/.
# Paths under `protocols:` are relative to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_deps/protocols/.
# Names under `sections:` resolve to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_deps/sections/<name>.md,
# except the unprefixed `protocols-index` which is rendered dynamically by the CLI
# as the cross-aspect unified catalog.
#
# See docs/specs/deps.md and ADR-0023.

files: []
depth-0:
  files: []
  protocols: []
  sections: []

depth-1:
  files: []
  protocols:
    - dependency-hygiene.md
  sections:
    - protocols-index

depth-2:
  # Phase A.8: scaffolded ci/check_deps.py + preflight wiring retired
  # (per ADR-0048 de-opinionation; substrate no longer ships consumer-side CI scripts).
  files: []
  protocols: []
  sections: []
