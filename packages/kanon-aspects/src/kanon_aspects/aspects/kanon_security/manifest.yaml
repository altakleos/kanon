kanon-dialect: "2026-05-01"
stability: experimental
depth-range: [0, 2]
default-depth: 1
description: "Secure-by-default protocols and CI scanner"
requires: []
provides:
  - security-discipline
suggests: []
# Security aspect — hardened defaults for LLM-agent-authored code.
#
# Depth 0: opt-out. Depth 1: prose guidance. Depth 2: prose + CI validator.
# Strict-superset semantics: depth-N is the union of depth-0..depth-N.
# Paths under `files:` are relative to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_security/files/.
# Paths under `protocols:` are relative to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_security/protocols/.
# Names under `sections:` resolve to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_security/sections/<name>.md,
# except the unprefixed `protocols-index` which is rendered dynamically by the CLI
# as the cross-aspect unified catalog.
#
# See docs/specs/security.md and ADR-0022.

files: []
depth-0:
  files: []
  protocols: []
  sections: []

depth-1:
  files: []
  protocols:
    - secure-defaults.md
  sections:
    - protocols-index

depth-2:
  # Phase A.8: scaffolded ci/check_security_patterns.py + preflight wiring retired
  # (per ADR-0048 de-opinionation).
  files: []
  protocols:
    - security-review.md
  sections: []
