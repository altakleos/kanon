kanon-dialect: "2026-05-01"
stability: experimental
depth-range: [0, 2]
default-depth: 1
description: "Release checklist, preflight, and CLI gate"
requires: []
provides:
  - release-discipline
suggests: []
# Release aspect — disciplined release publishing.
# Depth 0: opt-out. Depth 1: prose guidance. Depth 2: prose + automation.
# Strict-superset semantics: depth-N is the union of depth-0..depth-N.
# Paths under `files:` are relative to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_release/files/.
# Paths under `protocols:` are relative to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_release/protocols/.
# Names under `sections:` resolve to packages/kanon-aspects/src/kanon_aspects/aspects/kanon_release/sections/<name>.md,
# except the unprefixed `protocols-index` which is rendered dynamically by the CLI
# as the cross-aspect unified catalog.
#
# See docs/specs/release.md and ADR-0017.

files: []
depth-0:
  files: []
  protocols: []
  sections: []

depth-1:
  files: []
  protocols:
    - release-checklist.md
    - publishing-discipline.md
  sections:
    - protocols-index

depth-2:
  # Phase A.8: scaffolded ci/release-preflight.py + .github/workflows/release.yml
  # + preflight wiring retired (per ADR-0048 de-opinionation; substrate no longer
  # ships consumer-side CI scripts nor GitHub-Actions workflow files).
  files: []
  protocols: []
  sections: []
