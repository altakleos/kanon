[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kanon-kit"
dynamic = ["version"]
description = "Portable, self-hosting Spec-Driven Development kit for LLM-agent-driven repos. Works across Claude Code, Codex, Cursor, Copilot, Windsurf, and more."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=5.0",
    "mypy>=1.10",
    "ruff>=0.4",
    "types-PyYAML>=6.0",
]

[project.scripts]
kanon = "kanon.cli:main"

[tool.hatch.version]
path = "src/kanon/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/kanon"]

[tool.hatch.build.targets.sdist]
include = [
    "src/kanon",
    "README.md",
    "LICENSE",
    "CHANGELOG.md",
    "pyproject.toml",
]

[tool.mypy]
python_version = "3.10"
strict = true
packages = ["kanon"]
mypy_path = "src"

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.ruff]
target-version = "py310"
src = ["src", "tests", "ci"]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=kanon --cov-report=term-missing --cov-fail-under=90 -m 'not e2e'"
markers = ["e2e: end-to-end tests against installed package (slow)"]

[tool.coverage.run]
source = ["src/kanon"]
branch = true
