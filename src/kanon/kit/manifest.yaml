# Kanon kit manifest — aspect registry (v0.2 shape).
#
# Each top-level entry under `aspects:` declares one opt-in discipline the kit
# packages. Per-aspect file/protocol/section membership lives in each aspect's
# own sub-manifest at src/kanon/kit/aspects/<name>/manifest.yaml.
#
# Fields:
#   path          — directory under src/kanon/kit/ holding this aspect's bundle
#   stability     — experimental | stable | deprecated
#   depth-range   — [min, max] inclusive integer range for this aspect's depth dial
#   default-depth — depth used when the consumer opts in without specifying
#   requires      — list of other aspects (with optional version predicates) this
#                   aspect depends on; validated at `kanon aspect add` time
#
# Legacy `tier: N` in a consumer's .kanon/config.yaml auto-migrates to
# `aspects: {sdd: {depth: N, ...}}` on first `kanon upgrade`.
#
# See docs/design/aspect-model.md and ADR-0012.

aspects:
  sdd:
    path: aspects/sdd
    stability: stable
    depth-range: [0, 3]
    default-depth: 1
    requires: []

  worktrees:
    path: aspects/worktrees
    stability: experimental
    depth-range: [0, 2]
    default-depth: 1
    requires:
      - "sdd >= 1"
