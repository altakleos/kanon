# Kanon kit manifest — aspect registry (v0.3 shape).
#
# Each top-level entry under `aspects:` declares one opt-in discipline the kit
# packages. Per-aspect file/protocol/section membership lives in each aspect's
# own sub-manifest at src/kanon/kit/aspects/<name>/manifest.yaml.
#
# Aspect names follow the source-namespace grammar (ADR-0028): kit-shipped
# aspects are `kanon-<local>`. Consumer-defined project-aspects (Phase 3+) are
# `project-<local>`. Bare names at CLI input surfaces sugar to `kanon-`.
#
# Fields:
#   path          — directory under src/kanon/kit/ holding this aspect's bundle
#   stability     — experimental | stable | deprecated
#   depth-range   — [min, max] inclusive integer range for this aspect's depth dial
#   default-depth — depth used when the consumer opts in without specifying
#   requires      — list of other aspects (with optional version predicates) this
#                   aspect depends on; validated at `kanon aspect add` time
#
# Legacy `tier: N` in a consumer's .kanon/config.yaml auto-migrates to
# `aspects: {kanon-sdd: {depth: N, ...}}` on first `kanon upgrade`.
#
# See docs/design/aspect-model.md, ADR-0012, and ADR-0028.

defaults:
  - kanon-sdd

files:
  - .kanon/kit.md

aspects:
  kanon-sdd:
    path: aspects/kanon-sdd
    stability: stable
    depth-range: [0, 3]
    default-depth: 1
    requires: []
    provides:
      - planning-discipline
      - spec-discipline

  kanon-worktrees:
    path: aspects/kanon-worktrees
    stability: experimental
    depth-range: [0, 2]
    default-depth: 1
    requires: []
    suggests:
      - "kanon-sdd >= 1"
    provides:
      - worktree-isolation

  kanon-release:
    path: aspects/kanon-release
    stability: experimental
    depth-range: [0, 2]
    default-depth: 1
    requires: []
    provides:
      - release-discipline

  kanon-testing:
    path: aspects/kanon-testing
    stability: experimental
    depth-range: [0, 3]
    default-depth: 1
    requires: []
    suggests:
      - "kanon-sdd >= 1"
    provides:
      - test-discipline

  kanon-security:
    path: aspects/kanon-security
    stability: experimental
    depth-range: [0, 2]
    default-depth: 1
    requires: []
    provides:
      - security-discipline

  kanon-deps:
    path: aspects/kanon-deps
    stability: experimental
    depth-range: [0, 2]
    default-depth: 1
    requires: []
    provides:
      - dependency-hygiene

  kanon-fidelity:
    path: aspects/kanon-fidelity
    stability: experimental
    depth-range: [0, 1]
    default-depth: 1
    requires: []
    provides:
      - behavioural-verification
