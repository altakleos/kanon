# Security aspect — hardened defaults for LLM-agent-authored code.
#
# Depth 0: opt-out. Depth 1: prose guidance. Depth 2: prose + CI validator.
# Strict-superset semantics: depth-N is the union of depth-0..depth-N.
# Paths under `files:` are relative to src/kanon/kit/aspects/security/files/.
# Paths under `protocols:` are relative to src/kanon/kit/aspects/security/protocols/.
# Names under `sections:` resolve to src/kanon/kit/aspects/security/sections/<name>.md,
# except the unprefixed `protocols-index` which is rendered dynamically by the CLI
# as the cross-aspect unified catalog.
#
# See docs/specs/security.md and ADR-0022.

files: []
depth-0:
  files: []
  protocols: []
  sections: []

depth-1:
  files: []
  protocols:
    - secure-defaults.md
  sections:
    - secure-defaults
    - protocols-index

depth-2:
  files:
    - ci/check_security_patterns.py
  protocols: []
  sections: []
