# Per-aspect sub-manifest for `testing` — test discipline for LLM-agent-driven repos.
#
# Depth 0: opt-out. Depth 1: test discipline. Depth 2: AC-first + TDD. Depth 3: automated enforcement.
# Strict-superset semantics: depth-N is the union of depth-0..depth-N for scaffolding.
# Paths under `files:` are relative to src/kanon/kit/aspects/testing/files/.
# Paths under `protocols:` are relative to src/kanon/kit/aspects/testing/protocols/.
# Names under `sections:` resolve to src/kanon/kit/aspects/testing/sections/<name>.md,
# except the unprefixed `protocols-index` which is rendered dynamically by the CLI
# as the cross-aspect unified catalog.
#
# See docs/specs/testing.md and ADR-0021.

files: []
depth-0:
  files: []
  protocols: []
  sections: []

depth-1:
  files: []
  protocols:
    - test-discipline.md
    - error-diagnosis.md
  sections:
    - protocols-index

depth-2:
  files: []
  protocols:
    - ac-first-tdd.md
  sections: []
  validators:
    - kanon._validators.test_import_check

depth-3:
  files:
    - ci/check_test_quality.py
  protocols: []
  sections: []

# Optional: aspect config schema. When present, `kanon aspect set-config` and
# `kanon aspect add --config` validate keys/types against these entries.
# Allowed `type:` values: string, integer, boolean, number.
config-schema:
  coverage_floor:
    type: integer
    default: 80
    description: Advisory minimum total test-coverage percentage. The kit
      declares this value but does not auto-wire it into a test runner;
      consumers feed it into their own CI (e.g., `pytest --cov-fail-under`)
      to enforce the threshold.
