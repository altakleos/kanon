# Cross-harness shim registry for kanon.
#
# Each entry describes a harness-specific rule file that points at the
# canonical AGENTS.md at the repo root. New harnesses are added here
# without a Python code change; re-release the kit to propagate.
#
# See docs/specs/cross-harness-shims.md for the contract and ADR-0003
# for the canonical-AGENTS.md decision.

- name: claude-code
  path: CLAUDE.md
  body: |
    See @AGENTS.md

- name: kiro
  path: .kiro/steering/kanon.md
  body: |
    # kanon boot chain

    Read and follow the instructions in `AGENTS.md` at the repo root.

- name: cursor
  path: .cursor/rules/kanon.mdc
  frontmatter:
    description: kanon boot chain
    alwaysApply: true
  body: |
    Read and follow the instructions in `AGENTS.md` at the repo root.

- name: copilot
  path: .github/copilot-instructions.md
  body: |
    Read and follow the instructions in `AGENTS.md` at the repo root.

- name: windsurf
  path: .windsurf/rules/kanon.md
  frontmatter:
    trigger: always_on
  body: |
    Read and follow the instructions in `AGENTS.md` at the repo root.

- name: cline
  path: .clinerules/kanon.md
  body: |
    Read and follow the instructions in `AGENTS.md` at the repo root.

- name: roo
  path: .roo/rules/kanon.md
  body: |
    Read and follow the instructions in `AGENTS.md` at the repo root.

- name: jetbrains-ai
  path: .aiassistant/rules/kanon.md
  body: |
    Read and follow the instructions in `AGENTS.md` at the repo root.
