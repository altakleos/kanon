schema-version: 4
kanon-dialect: '2026-05-01'
provenance:
- recipe: reference-default
  publisher: kanon-aspects
  recipe-version: '1.0'
  applied_at: '2026-05-01T00:00:00+00:00'
kit_version: 0.5.0a6
aspects:
  kanon-deps:
    depth: 2
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-release:
    depth: 2
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-sdd:
    depth: 3
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-security:
    depth: 2
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-testing:
    depth: 3
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-worktrees:
    depth: 2
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-fidelity:
    depth: 1
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
preflight-stages:
  push:
  - run: .venv/bin/python scripts/check_security_patterns.py
    label: security-scan
  - run: .venv/bin/python scripts/check_deps.py
    label: deps-scan
  release:
  - run: .venv/bin/python -c "import kanon_core; v='$TAG'.lstrip('v'); assert kanon_core.__version__
      == v, f'{kanon_core.__version__} != {v}'"
    label: release-preflight
  - run: .venv/bin/python scripts/check_wheel_build.py --tag $TAG
    label: wheel-build-validate
