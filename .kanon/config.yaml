# v4 fields (added by Phase 0.5 per ADR-0045 — currently ignored by v3 kit; activated by Phase A.1).
# The provenance block records that this consumer opted in via the kanon-reference
# reference-default recipe (checked into .kanon/recipes/reference-default.yaml).
schema-version: 4
kanon-dialect: "2026-05-01"
provenance:
  - recipe: reference-default
    publisher: kanon-reference
    recipe-version: "1.0"
    applied_at: "2026-05-01T00:00:00+00:00"

# v3 fields (read by today's kit; preserved verbatim until Phase A.3 deletes the v3 reader).
kit_version: 0.3.1a1
aspects:
  kanon-deps:
    depth: 2
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-release:
    depth: 2
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-sdd:
    depth: 3
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-security:
    depth: 2
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-testing:
    depth: 3
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-worktrees:
    depth: 2
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
  kanon-fidelity:
    depth: 1
    enabled_at: '2026-04-28T22:48:17+00:00'
    config: {}
preflight-stages:
  push:
  - run: .venv/bin/python ci/check_security_patterns.py
    label: security-scan
  - run: .venv/bin/python ci/check_deps.py
    label: deps-scan
  release:
  - run: .venv/bin/python -c "import kanon; v='$TAG'.lstrip('v'); assert kanon.__version__
      == v, f'{kanon.__version__} != {v}'"
    label: release-preflight
