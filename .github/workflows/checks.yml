name: checks

on:
  workflow_call:
    inputs:
      fetch-depth:
        type: number
        default: 1
      python-versions:
        type: string
        default: '"3.10","3.11","3.12","3.13"'
      os:
        type: string
        default: '"ubuntu-latest"'
      is-pr:
        type: boolean
        default: false

jobs:
  check:
    name: check (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(format('[{0}]', inputs.os)) }}
        python-version: ${{ fromJson(format('[{0}]', inputs.python-versions)) }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: pytest -v

      - name: Lint with ruff
        run: ruff check packages/kanon-core/src/ packages/kanon-aspects/src/ tests/ scripts/

      - name: Type check with mypy
        run: mypy packages/kanon-core/src/kanon_core

      - name: Check foundations layer
        run: python scripts/check_foundations.py

      - name: Check markdown links
        run: python scripts/check_links.py

      - name: Check kit consistency
        run: python scripts/check_kit_consistency.py

      - name: Check ADR immutability (per ADR-0032)
        run: |
          if [ "${{ inputs.is-pr }}" = "true" ]; then
            python scripts/check_adr_immutability.py --base-ref "origin/${{ github.base_ref }}"
          else
            python scripts/check_adr_immutability.py
          fi

      - name: Check ADR-0042 canonical wording parity
        run: python scripts/check_adr_0042_wording.py

      - name: Check substrate-independence (per ADR-0044)
        run: python scripts/check_substrate_independence.py

      - name: Check docs/reference-aspects.md is in sync with source
        run: python scripts/gen_reference_aspects.py --check

      - name: Check publisher-symmetry (per plan T9 + AC7, P-publisher-symmetry)
        run: pytest tests/scripts/test_publisher_symmetry.py -v

      - name: Check process gates (plan-before-build, spec-before-design)
        run: |
          if [ "${{ inputs.is-pr }}" = "true" ]; then
            python scripts/check_process_gates.py --base-ref "origin/${{ github.base_ref }}"
          else
            python scripts/check_process_gates.py
          fi

      - name: Check commit messages (soft — warnings only)
        run: |
          if [ "${{ inputs.is-pr }}" = "true" ]; then
            python scripts/check_commit_messages.py --base-ref "origin/${{ github.base_ref }}"
          else
            python scripts/check_commit_messages.py
          fi

      - name: Check test quality
        run: python scripts/check_test_quality.py

      - name: Check spec invariant coverage
        run: python scripts/check_verified_by.py

      - name: Check invariant IDs
        run: python scripts/check_invariant_ids.py

      - name: Check security patterns (warnings)
        run: python scripts/check_security_patterns.py
        continue-on-error: true

      - name: Check dependency hygiene (warnings)
        run: python scripts/check_deps.py
        continue-on-error: true

      - name: Check status consistency (warnings)
        run: python scripts/check_status_consistency.py
        continue-on-error: true
