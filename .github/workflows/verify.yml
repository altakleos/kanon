name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
    with:
      fetch-depth: 0
      os: '"ubuntu-latest","macos-latest"'
      is-pr: ${{ github.event_name == 'pull_request' }}

  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package with dev extras
        run: pip install -e '.[dev]'

      - name: Run E2E tests
        # --no-cov: e2e selection covers a tiny slice of the codebase by design;
        # enforcing the 90% global coverage gate against e2e-only collection
        # always fails. Coverage is enforced in the main checks job.
        run: pytest -m e2e -v --no-cov
