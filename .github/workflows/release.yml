name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
      - 'v[0-9]+.[0-9]+.[0-9]+[a-z][0-9]+'

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  build-and-check:
    name: build + check package contents
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tool and runtime deps for scripts/check_package_contents.py
        run: pip install build pyyaml

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate wheel contents against tag
        run: |
          WHEEL=$(ls dist/*.whl)
          python scripts/check_package_contents.py --wheel "$WHEEL" --tag "${{ github.ref_name }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (trusted publishing)
    needs: build-and-check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
